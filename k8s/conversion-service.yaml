apiVersion: apps/v1
kind: Deployment
metadata:
  name: conversion-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: conversion-service
  template:
    metadata:
      labels:
        app: conversion-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: conversion-service
          image: ghcr.io/apollo87z/cpp-markdown-conversion-service:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: conversion-service
spec:
  type: LoadBalancer
  selector:
    app: conversion-service
  ports:
    - port: 80
      targetPort: 8080
