name: CI

on:
  push:
    branches: [ master, modernize-boost-to-std, add-legacy-tests ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libboost-all-dev librdkafka-dev libpq-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_CXX_STANDARD=20

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure

  build-and-push-image:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/apollo87z/cpp-markdown-conversion-service:latest

  deploy-to-aks:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: cpp-markdown-rg
          cluster-name: cpp-markdown-cluster

      - name: Deploy to AKS
        run: kubectl rollout restart deployment/conversion-service

  deploy-infra:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: cpp-markdown-rg
          cluster-name: cpp-markdown-cluster

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Apply Kafka manifests
        run: kubectl apply -f k8s/kafka/

      - name: Apply Postgres manifests
        run: |
          kubectl apply -f k8s/postgres/postgres.yaml -n tenant-shared
          kubectl apply -f k8s/postgres/postgres.yaml -n tenant-acme

      - name: Deploy shared tenant
        run: |
          helm upgrade --install shared-tenant k8s/helm/conversion-service \
            --namespace tenant-shared \
            --set tenant=shared \
            --set replicaCount=2 \
            --set service.type=ClusterIP \
            --set kafka.inputTopic=documents-to-convert-shared \
            --set kafka.outputTopic=converted-documents-shared

      - name: Deploy acme tenant
        run: |
          helm upgrade --install acme-tenant k8s/helm/conversion-service \
            --namespace tenant-acme \
            --set tenant=acme \
            --set replicaCount=1 \
            --set service.type=ClusterIP \
            --set kafka.inputTopic=documents-to-convert-acme \
            --set kafka.outputTopic=converted-documents-acme